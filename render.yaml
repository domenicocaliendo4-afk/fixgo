databases:
  - name: fixgo-db
    plan: free

services:
  - type: web
    runtime: node
    name: fixgo
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fixgo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_SALT
        generateValue: true
